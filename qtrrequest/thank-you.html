<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Submitted — Qatar Traffic Report</title>
  <meta name="description" content="Your Qatar Traffic Report request has been submitted." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --h: "Plus Jakarta Sans", sans-serif;
      --b: "DM Sans", sans-serif;
      --qtr-primary: #d42321;
      --qtr-primary-dark: #a81716;
      --qtr-primary-soft: #fff0ef;
      --qtr-text: #111320;
      --qtr-sub: #5d6477;
      --qtr-line: #e8dde2;
      --qtr-bg: #f7f7fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(247,247,250,.90), rgba(247,247,250,.96)),
        url('assets/images/qtr-traffic-bg.png') center center / cover fixed no-repeat;
       font-family: var(--b); color: var(--qtr-text); 
    }
    .request-shell { min-height: 100vh; padding: 72px 24px; display: flex; align-items: center; justify-content: center; }
    .success-card { max-width: 760px; width: 100%; text-align: center; padding: 56px; background: #fff; border: 1px solid var(--qtr-line); border-radius: 32px; box-shadow: 0 24px 70px rgba(15,18,33,.12); }
    .success-icon { width: 76px; height: 76px; display: inline-flex; align-items: center; justify-content: center; border-radius: 24px; background: rgba(212,35,33,.10); color: var(--qtr-primary); font-size: 34px; margin-bottom: 22px; }
    h1 { font-family: var(--h); font-size: clamp(34px, 4vw, 50px); line-height: 1.12; margin: 0 0 14px; }
    p { color: var(--qtr-sub); line-height: 1.8; margin: 0 auto 26px; max-width: 560px; }
    .success-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .btn { border: 0; cursor: pointer; appearance: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 52px; padding: 0 22px; border-radius: 14px; font-family: var(--h); font-size: 15px; font-weight: 800; text-decoration: none; transition: .2s ease; }
    .btn-primary { background: var(--qtr-primary); color: #fff; box-shadow: 0 16px 30px rgba(212,35,33,.18); }
    .btn-primary:hover { background: var(--qtr-primary-dark); color: #fff; }
    .btn-secondary { background: #fff; color: var(--qtr-primary); border: 1px solid rgba(212,35,33,.22); }
    .btn-secondary:hover { background: var(--qtr-primary-soft); color: var(--qtr-primary-dark); }
    .note { margin-top: 18px; font-size: 12.5px; color: #8a8fa0; }
    @media (max-width: 560px) { .request-shell { padding: 24px 16px; } .success-card { padding: 30px 22px; } .success-actions { flex-direction: column; } .success-actions .btn { width: 100%; } }
  </style>
</head>
<body>
<main class="request-shell">
  <section class="success-card">
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h1>Request submitted.</h1>
    <p>Your request has been submitted successfully. The Qatar Traffic Report and a copy of the accepted agreement will be sent to the work email address registered in the form.</p>
    <div class="success-actions">
      <p class="completion-note">You may now close this page.</p>
    </div>
  </section>
</main>


</body>
</html>
